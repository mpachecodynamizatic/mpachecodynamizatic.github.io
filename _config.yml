# ==============================================
#  TEMA
# ==============================================
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "air"   # opciones: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# ==============================================
#  SITIO
# ==============================================
title: "Marcelino Pacheco"
title_separator: "|"
subtitle: "Cacharreando un poco con BC"
name: "Marcelino Pacheco"
description: "Blog sobre Business Central y otras cosas"
url: "https://mpachecodynamizatic.github.io"
baseurl: ""
locale: "es-ES"
timezone: "Europe/Madrid"

# ==============================================
#  AUTOR
# ==============================================
author:
  name: "Marcelino Pacheco"
  bio: "Consultor certificado en Dynamics 365 Business Central"
  location: "España"
  # avatar: "/assets/images/avatar.jpg"   # descomenta y añade tu foto
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/TU_USUARIO"   # cambia por tu URL
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mpachecodynamizatic"

# ==============================================
#  NAVEGACIÓN
# ==============================================
# Se configura en _data/navigation.yml (ver más abajo)

# ==============================================
#  POSTS POR DEFECTO
# ==============================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# ==============================================
#  PAGINACIÓN
# ==============================================
paginate: 5
paginate_path: /page:num/

# ==============================================
#  PLUGINS
# ==============================================
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# ==============================================
#  CATEGORÍAS Y ETIQUETAS
# ==============================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
